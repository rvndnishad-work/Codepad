# Lightweight PR checks. Vercel already builds + type-checks every PR via Preview
# deployments, so CI here focuses on fast, DB-free safety gates: schema validity
# and lint. Make these "required status checks" in branch protection once green.
name: CI

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Prisma schema
        run: npx prisma validate
      - name: Lint
        run: npm run lint
