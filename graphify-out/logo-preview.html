<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Lockup v2</title>
<style>
  :root{--accent:#FFE600;--bg:#050505;--fg:#f5f5f5}
  body{margin:0;background:var(--bg);font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif}
  .wrap{padding:40px;display:flex;flex-direction:column;gap:34px;align-items:flex-start}
  .bar{display:flex;align-items:center;gap:16px;color:#777;font-size:12px}
  .navsim{background:#0d0d0d;border:1px solid #1c1c1c;border-radius:12px;height:64px;display:flex;align-items:center;padding:0 18px}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .cursor{animation:blink 1.05s step-end infinite}
</style></head>
<body><div class="wrap">

  <div class="bar"><span>54px in a 64px nav row</span></div>
  <div class="navsim">
    <svg width="150" height="54" viewBox="9 9 342 123" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M30 14 H330 a16 16 0 0 1 16 16 V84 a16 16 0 0 1 -16 16 H120 L76 128 L76 100 H30 a16 16 0 0 1 -16 -16 V30 a16 16 0 0 1 16 -16 Z M28 22 H332 a6 6 0 0 1 6 6 V88 a6 6 0 0 1 -6 6 H112 L84 114 L84 94 H28 a6 6 0 0 1 -6 -6 V28 a6 6 0 0 1 6 -6 Z" fill="var(--accent)"/>
      <path d="M54 44 l16 13 -16 13" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="86" y="68" font-size="38" font-weight="700" letter-spacing="-1" fill="var(--fg)">interview<tspan fill="var(--accent)">pad</tspan></text>
      <rect class="cursor" x="290" y="78" width="22" height="5" rx="2.5" fill="var(--accent)"/>
    </svg>
  </div>

  <div class="bar"><span>large (height 120)</span></div>
  <svg width="334" height="120" viewBox="9 9 342 123" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M30 14 H330 a16 16 0 0 1 16 16 V84 a16 16 0 0 1 -16 16 H120 l-44 28 v-28 H30 a16 16 0 0 1 -16 -16 V30 a16 16 0 0 1 16 -16 Z" stroke="var(--accent)" stroke-width="4.5" stroke-linejoin="round"/>
    <rect x="22" y="22" width="316" height="72" rx="6" stroke="var(--accent)" stroke-opacity="0.28" stroke-width="1.8"/>
    <path d="M54 44 l16 13 -16 13" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="68" font-size="38" font-weight="700" letter-spacing="-1" fill="var(--fg)">interview<tspan fill="var(--accent)">pad</tspan></text>
    <rect class="cursor" x="290" y="78" width="22" height="5" rx="2.5" fill="var(--accent)"/>
  </svg>

</div></body></html>
