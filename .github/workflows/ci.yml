# Lightweight PR checks. Vercel already builds + type-checks every PR via Preview
# deployments, so CI here focuses on fast, DB-free safety gates: schema validity
# and lint. Make these "required status checks" in branch protection once green.
name: CI

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: codepad_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Prisma schema
        run: npx prisma validate
      - name: Lint
        run: npm run lint
      - name: Deploy Prisma Migrations (Test DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codepad_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/codepad_test
      - name: Run unit tests
        run: npm run test:unit
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codepad_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/codepad_test
